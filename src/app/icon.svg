<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF953F" />
      <stop offset="50%" stop-color="#FCF6BA" />
      <stop offset="100%" stop-color="#B38728" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCF6BA" stop-opacity="0.95" />
      <stop offset="45%" stop-color="#BF953F" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#BF953F" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Badge backdrop -->
  <circle cx="50" cy="50" r="48" fill="#141414" stroke="#2c2c2c" stroke-width="2"/>

  <!-- Escaping glow -->
  <circle cx="50" cy="38" r="26" fill="url(#glow)"/>

  <!-- Colored wisps escaping the box -->
  <g stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M 44 34 C 40 24, 34 20, 30 14" stroke="#1B998B" stroke-width="2"/>
    <path d="M 56 32 C 60 22, 58 16, 62 8" stroke="#C81D6B" stroke-width="2"/>
    <path d="M 50 28 C 50 18, 46 12, 48 4" stroke="#6A4C93" stroke-width="2"/>
  </g>
  <circle cx="29" cy="12" r="1.6" fill="#1B998B"/>
  <circle cx="63" cy="6" r="1.6" fill="#C81D6B"/>
  <circle cx="48" cy="3" r="1.4" fill="#6A4C93"/>

  <!-- Lid, propped open at the back -->
  <polygon points="34,50 74,50 70,20 38,20" fill="#1c1712" stroke="url(#gold)" stroke-width="1.6"/>
  <line x1="38" y1="30" x2="70" y2="30" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>
  <circle cx="54" cy="35" r="2.6" fill="url(#gold)"/>

  <!-- Box opening rim -->
  <polygon points="30,50 78,50 72,57 36,57" fill="url(#gold)"/>
  <polygon points="36,57 72,57 72,54 36,54" fill="#0a0a0a"/>

  <!-- Box body -->
  <rect x="26" y="57" width="48" height="27" rx="3" fill="#1c1712" stroke="url(#gold)" stroke-width="1.6"/>
  <line x1="26" y1="67" x2="74" y2="67" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <line x1="26" y1="76" x2="74" y2="76" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>

  <!-- Corner studs -->
  <circle cx="30" cy="61" r="1.4" fill="url(#gold)"/>
  <circle cx="70" cy="61" r="1.4" fill="url(#gold)"/>
  <circle cx="30" cy="80" r="1.4" fill="url(#gold)"/>
  <circle cx="70" cy="80" r="1.4" fill="url(#gold)"/>

  <!-- Front clasp -->
  <rect x="47" y="60" width="6" height="10" rx="1.5" fill="url(#gold)"/>
</svg>
