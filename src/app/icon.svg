<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF953F" />
      <stop offset="50%" stop-color="#FCF6BA" />
      <stop offset="100%" stop-color="#B38728" />
    </linearGradient>
  </defs>
  
  <!-- Record Body -->
  <circle cx="50" cy="50" r="48" fill="#1e1e1e" stroke="#2c2c2c" stroke-width="2"/>
  
  <!-- Grooves -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#666" stroke-width="1" opacity="0.4"/>
  <circle cx="50" cy="50" r="32" fill="none" stroke="#666" stroke-width="1" opacity="0.3"/>
  <circle cx="50" cy="50" r="24" fill="none" stroke="#666" stroke-width="1" opacity="0.4"/>
  
  <!-- Subtle Shiny Highlights -->
  <path d="M 50 10 A 40 40 0 0 1 85 30" fill="none" stroke="#fff" stroke-width="2" opacity="0.15"/>
  <path d="M 50 90 A 40 40 0 0 1 15 70" fill="none" stroke="#fff" stroke-width="2" opacity="0.1"/>
  
  <!-- Center Label -->
  <circle cx="50" cy="50" r="16" fill="url(#gold)"/>
  
  <!-- Label text lines -->
  <line x1="42" y1="42" x2="58" y2="42" stroke="#000" stroke-width="1" opacity="0.5"/>
  <line x1="45" y1="58" x2="55" y2="58" stroke="#000" stroke-width="1" opacity="0.5"/>
  
  <!-- Spindle Hole -->
  <circle cx="50" cy="50" r="3" fill="#0a0a0a"/>
</svg>
